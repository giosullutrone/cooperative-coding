  <line x1="445" y1="180" x2="445" y2="376" stroke="#1a1f36" stroke-width="1.5" stroke-dasharray="4,4" fill="none" opacity="0.35" marker-end="url(#arrow-ink)"/>
  <rect x="450" y="334" width="34" height="18" rx="3" fill="#f4f0ea"/>
  <text x="467" y="347" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">uses</text>

