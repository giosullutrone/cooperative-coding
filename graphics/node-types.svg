<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.8" fill="#a09080" opacity="0.15"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1a1f36" opacity="0.55"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#3a7a5a"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#b07070"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,5 L6,0 L12,5 L6,10 Z" fill="#1a1f36" opacity="0.5"/>
    </marker>
  </defs>

  <!-- ====== BACKGROUND ====== -->
  <rect width="1000" height="720" fill="#f4f0ea"/>
  <rect width="1000" height="720" fill="url(#dots)"/>
  <text x="500" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#d94f30" letter-spacing="2">NODE TYPES &amp; RELATIONSHIPS</text>

  <!-- ====== PACKAGE CONTAINER ====== -->
  <rect x="40" y="55" width="540" height="430" rx="10" stroke="#b0b0b0" stroke-width="2" stroke-dasharray="8,5" fill="none"/>
  <rect x="55" y="47" width="130" height="20" rx="3" fill="#f4f0ea"/>
  <text x="120" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#707070">package: models</text>

  <!-- ====== EDGES (all drawn before nodes) ====== -->

  <!-- 1. extends: Dog -> Animal -->
  <line x1="350" y1="140" x2="264" y2="140" stroke="#1a1f36" stroke-width="2" opacity="0.55" marker-end="url(#arrow-ink)"/>
  <rect x="280" y="127" width="58" height="18" rx="3" fill="#f4f0ea"/>
  <text x="309" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">extends</text>

  <!-- 2. member: Dog -> bark() -->
  <path d="M 420 180 L 420 210 Q 420 220 410 220 L 400 220 Q 395 220 395 230 L 395 240" stroke="#1a1f36" stroke-width="1.5" fill="none" opacity="0.45" marker-end="url(#arrow-ink)"/>
  <rect x="430" y="201" width="55" height="18" rx="3" fill="#f4f0ea"/>
  <text x="457" y="214" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">member</text>

  <!-- 3. member: Dog -> breed -->
  <path d="M 400 180 L 400 210 Q 400 220 380 220 L 200 220 Q 180 220 180 230 L 180 240" stroke="#1a1f36" stroke-width="1.5" fill="none" opacity="0.45" marker-end="url(#arrow-ink)"/>

  <!-- 4. has-a: Dog -> Collar -->
  <path d="M 445 180 L 445 355 Q 445 370 430 370 L 210 370 Q 195 370 195 380" stroke="#1a1f36" stroke-width="2" fill="none" opacity="0.45" marker-end="url(#diamond)"/>
  <rect x="450" y="274" width="42" height="18" rx="3" fill="#f4f0ea"/>
  <text x="471" y="287" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">has-a</text>

  <!-- 5. implements: Dog -> Drawable -->
  <line x1="540" y1="130" x2="656" y2="130" stroke="#1a1f36" stroke-width="2" stroke-dasharray="8,5" opacity="0.45" marker-end="url(#arrow-ink)"/>
  <rect x="566" y="117" width="76" height="18" rx="3" fill="#f4f0ea"/>
  <text x="604" y="130" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">implements</text>

  <!-- 6. tests: TestDog -> Dog -->
  <path d="M 660 270 L 600 270 Q 580 270 580 250 L 580 160 Q 580 145 544 145" stroke="#3a7a5a" stroke-width="2.5" fill="none" opacity="0.6" marker-end="url(#arrow-green)"/>
  <rect x="584" y="204" width="40" height="18" rx="3" fill="#f4f0ea"/>
  <text x="604" y="217" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a7a5a">tests</text>

