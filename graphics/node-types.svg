  <!-- Animal (sage/class) -->
  <g>
    <rect x="70" y="100" width="190" height="80" rx="10" fill="white" stroke="#8cb88c" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="70" y="100" width="190" height="6" rx="10 10 0 0" fill="#8cb88c"/>
    <text x="165" y="136" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2d5a2d">Animal</text>
    <text x="165" y="157" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d5a2d">class</text>
  </g>

  <!-- Dog (sage/class) -->
  <g>
    <rect x="350" y="100" width="190" height="80" rx="10" fill="white" stroke="#8cb88c" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="350" y="100" width="190" height="6" rx="10 10 0 0" fill="#8cb88c"/>
    <text x="445" y="136" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2d5a2d">Dog</text>
    <text x="445" y="157" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d5a2d">class</text>
