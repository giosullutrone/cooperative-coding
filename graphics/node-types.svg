  <rect x="580" y="562" width="24" height="24" rx="4" fill="white" stroke="#d4a0a0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="580" y="562" width="24" height="4" rx="4 4 0 0" fill="#d4a0a0"/>
  <text x="610" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">context</text>

  <!-- package swatch (dashed border) -->
  <rect x="690" y="562" width="24" height="24" rx="4" fill="white" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="690" y="562" width="24" height="4" rx="4 4 0 0" fill="#b0b0b0"/>
  <text x="720" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">package</text>

  <!-- module swatch -->
  <rect x="810" y="562" width="24" height="24" rx="4" fill="white" stroke="#b0b0b0" stroke-width="1.5"/>
  <rect x="810" y="562" width="24" height="4" rx="4 4 0 0" fill="#b0b0b0"/>
  <text x="840" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">module</text>

  <!-- Row 2: Edge Types -->
  <text x="70" y="620" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1f36">Edge Types</text>

  <!-- extends -->
  <line x1="70" y1="638" x2="105" y2="638" stroke="#1a1f36" stroke-width="2" opacity="0.55" marker-end="url(#arrow-ink)"/>
  <text x="115" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">extends</text>

  <!-- implements -->
  <line x1="200" y1="638" x2="235" y2="638" stroke="#1a1f36" stroke-width="2" stroke-dasharray="8,5" opacity="0.45" marker-end="url(#arrow-ink)"/>
  <text x="245" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">implements</text>

  <!-- has-a -->
  <line x1="350" y1="638" x2="385" y2="638" stroke="#1a1f36" stroke-width="2" opacity="0.45" marker-end="url(#diamond)"/>
  <text x="395" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">has-a</text>

  <!-- uses -->
  <line x1="460" y1="638" x2="495" y2="638" stroke="#1a1f36" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.35" marker-end="url(#arrow-ink)"/>
  <text x="505" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">uses</text>

  <!-- member -->
  <line x1="560" y1="638" x2="595" y2="638" stroke="#1a1f36" stroke-width="1.5" opacity="0.45" marker-end="url(#arrow-ink)"/>
  <text x="605" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">member</text>

