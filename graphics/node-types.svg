  <path d="M 660 430 L 600 430 Q 580 430 580 410 L 580 360 Q 580 340 540 340 L 480 340 Q 460 340 460 320 L 460 184" stroke="#b07070" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.5" marker-end="url(#arrow-rose)"/>
  <rect x="517" y="374" width="55" height="18" rx="3" fill="#f4f0ea"/>
  <text x="544" y="387" text-anchor="middle" font-family="monospace" font-size="11" fill="#b07070">context</text>

