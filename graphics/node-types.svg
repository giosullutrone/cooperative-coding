  <text x="100" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">class</text>

  <!-- interface swatch -->
  <rect x="170" y="562" width="24" height="24" rx="4" fill="white" stroke="#7ea8d0" stroke-width="1.5"/>
  <rect x="170" y="562" width="24" height="4" rx="4 4 0 0" fill="#7ea8d0"/>
  <text x="200" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">interface</text>

  <!-- method swatch -->
  <rect x="290" y="562" width="24" height="24" rx="4" fill="white" stroke="#b898c8" stroke-width="1.5"/>
  <rect x="290" y="562" width="24" height="4" rx="4 4 0 0" fill="#b898c8"/>
  <text x="320" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">method</text>

  <!-- field swatch -->
  <rect x="400" y="562" width="24" height="24" rx="4" fill="white" stroke="#d0c888" stroke-width="1.5"/>
  <rect x="400" y="562" width="24" height="4" rx="4 4 0 0" fill="#d0c888"/>
  <text x="430" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">field</text>

  <!-- test swatch -->
  <rect x="490" y="562" width="24" height="24" rx="4" fill="white" stroke="#7ac0a0" stroke-width="1.5"/>
  <rect x="490" y="562" width="24" height="4" rx="4 4 0 0" fill="#7ac0a0"/>
  <text x="520" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">test</text>

