    <rect x="660" y="240" width="200" height="80" rx="10" fill="white" stroke="#7ac0a0" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="660" y="240" width="200" height="6" rx="10 10 0 0" fill="#7ac0a0"/>
    <text x="760" y="276" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a5a3a">TestDog</text>
    <text x="760" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a5a3a">test</text>
