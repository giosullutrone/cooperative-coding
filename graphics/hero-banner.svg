<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.8" fill="#a09080" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Warm Base background -->
  <rect width="1200" height="400" fill="#f4f0ea"/>

  <!-- Dot-grid pattern -->
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Faint edge lines with small colored dots (top-right corner area) -->
  <g opacity="0.08">
    <line x1="980" y1="30" x2="1150" y2="95" stroke="#1a1f36" stroke-width="1"/>
    <circle cx="980" cy="30" r="4" fill="#d94f30"/>
    <circle cx="1150" cy="95" r="4" fill="#1a1f36"/>

    <line x1="1050" y1="20" x2="1180" y2="70" stroke="#d94f30" stroke-width="1"/>
    <circle cx="1050" cy="20" r="3" fill="#1a1f36"/>
    <circle cx="1180" cy="70" r="3" fill="#d94f30"/>

    <line x1="1100" y1="50" x2="1190" y2="130" stroke="#1a1f36" stroke-width="1"/>
    <circle cx="1100" cy="50" r="3" fill="#d94f30"/>
    <circle cx="1190" cy="130" r="3" fill="#1a1f36"/>
  </g>

  <!-- Faint edge lines with small colored dots (bottom-left corner area) -->
  <g opacity="0.08">
    <line x1="20" y1="300" x2="180" y2="370" stroke="#1a1f36" stroke-width="1"/>
    <circle cx="20" cy="300" r="4" fill="#d94f30"/>
    <circle cx="180" cy="370" r="4" fill="#1a1f36"/>

    <line x1="50" y1="330" x2="200" y2="390" stroke="#d94f30" stroke-width="1"/>
    <circle cx="50" cy="330" r="3" fill="#1a1f36"/>
    <circle cx="200" cy="390" r="3" fill="#d94f30"/>
  </g>

  <!-- Decorative node-type labels at low opacity -->

  <!-- "class" label: top-left area -->
  <g opacity="0.28" transform="rotate(-3, 130, 65)">
    <rect x="70" y="48" width="120" height="34" rx="6" fill="#e8f0e8" stroke="#8cb88c" stroke-width="1.5"/>
    <text x="130" y="70" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#2d5a2d">class</text>
  </g>

  <!-- "method" label: top-right area -->
  <g opacity="0.25" transform="rotate(4, 1030, 55)">
    <rect x="960" y="38" width="140" height="34" rx="6" fill="#f0e8f4" stroke="#b898c8" stroke-width="1.5"/>
    <text x="1030" y="60" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#5a3a6a">method</text>
  </g>

  <!-- "field" label: bottom-right area -->
  <g opacity="0.28" transform="rotate(-5, 1050, 335)">
    <rect x="988" y="318" width="124" height="34" rx="6" fill="#f4f0e0" stroke="#d0c888" stroke-width="1.5"/>
    <text x="1050" y="340" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#6a5a1a">field</text>
  </g>

  <!-- "interface" label: bottom-left area -->
  <g opacity="0.25" transform="rotate(3, 130, 330)">
    <rect x="52" y="313" width="156" height="34" rx="6" fill="#e0e8f4" stroke="#7ea8d0" stroke-width="1.5"/>
    <text x="130" y="335" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#2a5a7a">interface</text>
  </g>

  <!-- "test" label: top center-left area -->
  <g opacity="0.22" transform="rotate(-2, 310, 40)">
    <rect x="256" y="24" width="108" height="32" rx="6" fill="#e4f4e8" stroke="#7ac0a0" stroke-width="1.5"/>
    <text x="310" y="45" font-family="Georgia, serif" font-size="13" text-anchor="middle" fill="#1a5a3a">test</text>
  </g>

  <!-- Centered content group -->
  <g>
    <!-- Logo mark: two overlapping circles centered at x=600 -->
    <!-- Left circle: cx=590, right circle: cx=610, center of pair = 600 -->
    <circle cx="590" cy="110" r="20" fill="none" stroke="#1a1f36" stroke-width="3" opacity="0.3"/>
    <circle cx="610" cy="110" r="20" fill="none" stroke="#d94f30" stroke-width="3" opacity="0.3"/>

    <!-- "CooperativeCoding" wordmark -->
    <text x="600" y="175" font-family="Georgia, serif" font-size="64" font-style="italic" text-anchor="middle" fill="#1a1f36">CooperativeCoding</text>

    <!-- Subtitle -->
    <text x="600" y="215" font-family="Georgia, serif" font-size="20" font-style="italic" text-anchor="middle" fill="#8a8078">An open specification for human-AI collaborative software design</text>

    <!-- Version badge -->
    <rect x="550" y="252" width="100" height="32" rx="16" fill="none" stroke="#d94f30" stroke-width="2"/>
    <text x="600" y="273" font-family="monospace" font-size="14" text-anchor="middle" fill="#d94f30">v1.0.0</text>
  </g>
</svg>
