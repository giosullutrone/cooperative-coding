<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4361ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f9690;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background for contrast (optional, remove if you want transparent) -->
  <rect width="512" height="512" fill="#ffffff" opacity="0"/>

  <!-- Central grid/blueprint element -->
  <g opacity="0.15">
    <line x1="120" y1="120" x2="392" y2="120" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="180" x2="392" y2="180" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="240" x2="392" y2="240" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="300" x2="392" y2="300" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="360" x2="392" y2="360" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="120" y1="420" x2="392" y2="420" stroke="#1a1a2e" stroke-width="1"/>

    <line x1="120" y1="120" x2="120" y2="420" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="180" y1="120" x2="180" y2="420" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="240" y1="120" x2="240" y2="420" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="300" y1="120" x2="300" y2="420" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="360" y1="120" x2="360" y2="420" stroke="#1a1a2e" stroke-width="1"/>
    <line x1="392" y1="120" x2="392" y2="420" stroke="#1a1a2e" stroke-width="1"/>
  </g>

  <!-- Left node (Human) -->
  <circle cx="180" cy="200" r="48" fill="none" stroke="#4361ee" stroke-width="3"/>
  <circle cx="180" cy="200" r="40" fill="url(#blueGradient)" opacity="0.2"/>

  <!-- Human representation: geometric shapes -->
  <circle cx="180" cy="175" r="12" fill="#4361ee"/>
  <path d="M 170 195 L 170 220 M 190 195 L 190 220 M 170 205 L 190 205"
        stroke="#4361ee" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="165" cy="225" r="6" fill="#4361ee"/>
  <circle cx="195" cy="225" r="6" fill="#4361ee"/>

  <!-- Right node (AI) -->
  <circle cx="332" cy="200" r="48" fill="none" stroke="#0f9690" stroke-width="3"/>
  <circle cx="332" cy="200" r="40" fill="url(#tealGradient)" opacity="0.2"/>

  <!-- AI representation: circuit/tech pattern -->
  <circle cx="332" cy="175" r="12" fill="#0f9690"/>
  <rect x="318" y="195" width="28" height="20" rx="3" fill="none" stroke="#0f9690" stroke-width="2"/>
  <circle cx="325" cy="205" r="3" fill="#0f9690"/>
  <circle cx="332" cy="205" r="3" fill="#0f9690"/>
  <circle cx="339" cy="205" r="3" fill="#0f9690"/>
  <circle cx="307" cy="230" r="5" fill="#0f9690"/>
  <circle cx="357" cy="230" r="5" fill="#0f9690"/>

  <!-- Connection path (curved bridge) -->
  <path d="M 228 200 Q 256 180 284 200"
        stroke="url(#tealGradient)" stroke-width="3" fill="none"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Connection nodes along the bridge -->
  <circle cx="240" cy="195" r="4" fill="#f72585"/>
  <circle cx="256" cy="180" r="4" fill="#f72585"/>
  <circle cx="272" cy="195" r="4" fill="#f72585"/>

  <!-- Upper connecting lines (architectural/structural) -->
  <line x1="180" y1="152" x2="256" y2="130" stroke="#4361ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="332" y1="152" x2="256" y2="130" stroke="#0f9690" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Central hub (unity point) -->
  <circle cx="256" cy="130" r="8" fill="#f72585" filter="url(#glow)"/>
  <circle cx="256" cy="130" r="5" fill="#ff6b9d" opacity="0.8"/>

  <!-- Lower connecting lines (architectural/structural) -->
  <line x1="180" y1="248" x2="256" y2="280" stroke="#4361ee" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="332" y1="248" x2="256" y2="280" stroke="#0f9690" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Lower hub -->
  <circle cx="256" cy="280" r="8" fill="#f72585" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="5" fill="#ff6b9d" opacity="0.8"/>

  <!-- Accent geometric elements (architectural frame) -->
  <path d="M 140 140 L 160 120 L 180 140" stroke="#4361ee" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 332 140 L 352 120 L 372 140" stroke="#0f9690" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 140 360 L 160 380 L 180 360" stroke="#4361ee" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 332 360 L 352 380 L 372 360" stroke="#0f9690" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Subtle corner markers (blueprint style) -->
  <circle cx="130" cy="130" r="3" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="382" cy="130" r="3" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="130" cy="370" r="3" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="382" cy="370" r="3" fill="#1a1a2e" opacity="0.4"/>
</svg>