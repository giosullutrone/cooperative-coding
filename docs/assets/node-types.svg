<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.8" fill="#a09080" opacity="0.15"/>
    </pattern>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1a1f36"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#3a7a5a"/>
    </marker>
    <marker id="arrow-rose" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#b07070"/>
    </marker>
    <marker id="diamond" markerWidth="12" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,5 L6,0 L12,5 L6,10 Z" fill="#1a1f36"/>
    </marker>
  </defs>

  <!-- ====== BACKGROUND ====== -->
  <rect width="1000" height="720" fill="#f4f0ea"/>
  <rect width="1000" height="720" fill="url(#dots)"/>
  <text x="500" y="38" text-anchor="middle" font-family="monospace" font-size="12" fill="#d94f30" letter-spacing="2">NODE TYPES &amp; RELATIONSHIPS</text>

  <!-- ====== PACKAGE CONTAINER ====== -->
  <rect x="40" y="55" width="540" height="430" rx="10" stroke="#b0b0b0" stroke-width="2" stroke-dasharray="8,5" fill="none"/>
  <rect x="55" y="47" width="130" height="20" rx="3" fill="#f4f0ea"/>
  <text x="120" y="62" text-anchor="middle" font-family="monospace" font-size="11" fill="#707070">package: models</text>

  <!-- ====== EDGES (drawn first, behind nodes) ====== -->
  <!-- No opacity on any edge - use lighter colors for subtlety -->

  <!-- 1. extends: Dog -> Animal -->
  <line x1="348" y1="140" x2="264" y2="140" stroke="#8a8480" stroke-width="2" marker-end="url(#arrow-ink)"/>

  <!-- 2. member: Dog -> bark() (x=415, spaced from other verticals) -->
  <path d="M 415 182 L 415 210 Q 415 220 405 220 L 400 220 Q 395 220 395 230 L 395 238" stroke="#b0aaa2" stroke-width="1.5" fill="none" marker-end="url(#arrow-ink)"/>

  <!-- 3. member: Dog -> breed (x=390, spaced from bark member) -->
  <path d="M 390 182 L 390 210 Q 390 220 370 220 L 200 220 Q 180 220 180 230 L 180 238" stroke="#b0aaa2" stroke-width="1.5" fill="none" marker-end="url(#arrow-ink)"/>

  <!-- 4. has-a: Dog -> Collar (x=465, spaced 25px from member edges) -->
  <path d="M 465 182 L 465 355 Q 465 370 445 370 L 210 370 Q 195 370 195 378" stroke="#8a8480" stroke-width="2" fill="none" marker-end="url(#diamond)"/>

  <!-- 5. implements: Dog -> Drawable -->
  <line x1="542" y1="130" x2="658" y2="130" stroke="#8a8480" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrow-ink)"/>

  <!-- 6. tests: TestDog -> Dog -->
  <path d="M 658 270 L 600 270 Q 580 270 580 250 L 580 160 Q 580 145 542 145" stroke="#3a7a5a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <!-- 7. uses: Dog -> persistence (x=440, spaced from has-a at x=465) -->
  <line x1="440" y1="182" x2="440" y2="378" stroke="#b0aaa2" stroke-width="1.5" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-ink)"/>

  <!-- 8. context: Context -> Dog (x=480, spaced from has-a at x=465) -->
  <path d="M 658 430 L 610 430 Q 590 430 590 410 L 590 355 Q 590 340 560 340 L 500 340 Q 480 340 480 320 L 480 182" stroke="#b07070" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-rose)"/>

  <!-- ====== NODES (drawn on top of edges) ====== -->

  <!-- Animal (sage/class) -->
  <g>
    <rect x="70" y="100" width="190" height="80" rx="10" fill="white" stroke="#8cb88c" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="70" y="100" width="190" height="6" rx="10 10 0 0" fill="#8cb88c"/>
    <text x="165" y="136" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2d5a2d">Animal</text>
    <text x="165" y="157" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d5a2d">class</text>
  </g>

  <!-- Dog (sage/class) -->
  <g>
    <rect x="350" y="100" width="190" height="80" rx="10" fill="white" stroke="#8cb88c" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="350" y="100" width="190" height="6" rx="10 10 0 0" fill="#8cb88c"/>
    <text x="445" y="136" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2d5a2d">Dog</text>
    <text x="445" y="157" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d5a2d">class</text>
  </g>

  <!-- bark() (lavender/method) -->
  <g>
    <rect x="310" y="240" width="170" height="75" rx="10" fill="white" stroke="#b898c8" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="310" y="240" width="170" height="6" rx="10 10 0 0" fill="#b898c8"/>
    <text x="395" y="275" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#5a3a6a">bark()</text>
    <text x="395" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5a3a6a">method</text>
  </g>

  <!-- breed (wheat/field) -->
  <g>
    <rect x="100" y="240" width="160" height="75" rx="10" fill="white" stroke="#d0c888" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="100" y="240" width="160" height="6" rx="10 10 0 0" fill="#d0c888"/>
    <text x="180" y="275" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#6a5a1a">breed</text>
    <text x="180" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6a5a1a">field</text>
  </g>

  <!-- Collar (sage/class) -->
  <g>
    <rect x="100" y="380" width="190" height="80" rx="10" fill="white" stroke="#8cb88c" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="100" y="380" width="190" height="6" rx="10 10 0 0" fill="#8cb88c"/>
    <text x="195" y="416" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2d5a2d">Collar</text>
    <text x="195" y="437" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2d5a2d">class</text>
  </g>

  <!-- persistence (module) -->
  <g>
    <rect x="350" y="380" width="190" height="80" rx="10" fill="white" stroke="#b0b0b0" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="350" y="380" width="190" height="6" rx="10 10 0 0" fill="#b0b0b0"/>
    <text x="445" y="413" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#1a1f36">&#171;module&#187;</text>
    <text x="445" y="437" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="600" fill="#1a1f36">persistence</text>
  </g>

  <!-- Drawable (sky/interface) -->
  <g>
    <rect x="660" y="100" width="200" height="80" rx="10" fill="white" stroke="#7ea8d0" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="660" y="100" width="200" height="6" rx="10 10 0 0" fill="#7ea8d0"/>
    <text x="760" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#2a5a7a">&#171;interface&#187;</text>
    <text x="760" y="153" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#2a5a7a">Drawable</text>
  </g>

  <!-- TestDog (mint/test) -->
  <g>
    <rect x="660" y="240" width="200" height="80" rx="10" fill="white" stroke="#7ac0a0" stroke-width="2.5" filter="url(#shadow)"/>
    <rect x="660" y="240" width="200" height="6" rx="10 10 0 0" fill="#7ac0a0"/>
    <text x="760" y="276" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1a5a3a">TestDog</text>
    <text x="760" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1a5a3a">test</text>
  </g>

  <!-- Context (rose/context, dashed border) -->
  <g>
    <rect x="660" y="390" width="230" height="90" rx="10" fill="white" stroke="#d4a0a0" stroke-width="2.5" stroke-dasharray="8,5" filter="url(#shadow)"/>
    <rect x="660" y="390" width="230" height="6" rx="10 10 0 0" fill="#d4a0a0"/>
    <text x="775" y="418" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#8a4a4a">context</text>
    <text x="775" y="442" text-anchor="middle" font-family="sans-serif" font-size="14" font-style="italic" fill="#8a4a4a">Create dog management</text>
    <text x="775" y="462" text-anchor="middle" font-family="sans-serif" font-size="14" font-style="italic" fill="#8a4a4a">application</text>
  </g>

  <!-- ====== EDGE LABELS (drawn last, on top of everything) ====== -->

  <!-- extends label (between Animal and Dog) -->
  <rect x="274" y="127" width="62" height="18" rx="3" fill="#f4f0ea"/>
  <text x="305" y="140" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">extends</text>

  <!-- member label (between Dog bottom and bark/breed) -->
  <rect x="408" y="200" width="55" height="18" rx="3" fill="#f4f0ea"/>
  <text x="435" y="213" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">member</text>

  <!-- has-a label (on horizontal segment between breed/bark and Collar) -->
  <rect x="290" y="357" width="42" height="18" rx="3" fill="#f4f0ea"/>
  <text x="311" y="370" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">has-a</text>

  <!-- implements label (between Dog and Drawable) -->
  <rect x="566" y="117" width="76" height="18" rx="3" fill="#f4f0ea"/>
  <text x="604" y="130" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">implements</text>

  <!-- tests label (on vertical segment between TestDog and Dog) -->
  <rect x="584" y="200" width="40" height="18" rx="3" fill="#f4f0ea"/>
  <text x="604" y="213" text-anchor="middle" font-family="monospace" font-size="11" fill="#3a7a5a">tests</text>

  <!-- uses label (on vertical segment between Dog and persistence) -->
  <rect x="452" y="330" width="34" height="18" rx="3" fill="#f4f0ea"/>
  <text x="469" y="343" text-anchor="middle" font-family="monospace" font-size="11" fill="#1a1f36">uses</text>

  <!-- context label (between TestDog and Context, on the path) -->
  <rect x="590" y="340" width="55" height="18" rx="3" fill="#f4f0ea"/>
  <text x="617" y="353" text-anchor="middle" font-family="monospace" font-size="11" fill="#b07070">context</text>

  <!-- ====== LEGEND ====== -->
  <rect x="40" y="520" width="920" height="170" rx="10" fill="white" stroke="#e2ddd5" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Row 1: Node Types -->
  <text x="70" y="550" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1f36">Node Types</text>

  <rect x="70" y="562" width="24" height="24" rx="4" fill="white" stroke="#8cb88c" stroke-width="1.5"/>
  <rect x="70" y="562" width="24" height="4" rx="4 4 0 0" fill="#8cb88c"/>
  <text x="100" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">class</text>

  <rect x="170" y="562" width="24" height="24" rx="4" fill="white" stroke="#7ea8d0" stroke-width="1.5"/>
  <rect x="170" y="562" width="24" height="4" rx="4 4 0 0" fill="#7ea8d0"/>
  <text x="200" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">interface</text>

  <rect x="290" y="562" width="24" height="24" rx="4" fill="white" stroke="#b898c8" stroke-width="1.5"/>
  <rect x="290" y="562" width="24" height="4" rx="4 4 0 0" fill="#b898c8"/>
  <text x="320" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">method</text>

  <rect x="400" y="562" width="24" height="24" rx="4" fill="white" stroke="#d0c888" stroke-width="1.5"/>
  <rect x="400" y="562" width="24" height="4" rx="4 4 0 0" fill="#d0c888"/>
  <text x="430" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">field</text>

  <rect x="490" y="562" width="24" height="24" rx="4" fill="white" stroke="#7ac0a0" stroke-width="1.5"/>
  <rect x="490" y="562" width="24" height="4" rx="4 4 0 0" fill="#7ac0a0"/>
  <text x="520" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">test</text>

  <rect x="580" y="562" width="24" height="24" rx="4" fill="white" stroke="#d4a0a0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="580" y="562" width="24" height="4" rx="4 4 0 0" fill="#d4a0a0"/>
  <text x="610" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">context</text>

  <rect x="690" y="562" width="24" height="24" rx="4" fill="white" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="690" y="562" width="24" height="4" rx="4 4 0 0" fill="#b0b0b0"/>
  <text x="720" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">package</text>

  <rect x="810" y="562" width="24" height="24" rx="4" fill="white" stroke="#b0b0b0" stroke-width="1.5"/>
  <rect x="810" y="562" width="24" height="4" rx="4 4 0 0" fill="#b0b0b0"/>
  <text x="840" y="579" font-family="sans-serif" font-size="11" fill="#1a1f36">module</text>

  <!-- Row 2: Edge Types -->
  <text x="70" y="620" font-family="sans-serif" font-size="13" font-weight="700" fill="#1a1f36">Edge Types</text>

  <line x1="70" y1="638" x2="105" y2="638" stroke="#8a8480" stroke-width="2" marker-end="url(#arrow-ink)"/>
  <text x="115" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">extends</text>

  <line x1="200" y1="638" x2="235" y2="638" stroke="#8a8480" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrow-ink)"/>
  <text x="245" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">implements</text>

  <line x1="350" y1="638" x2="385" y2="638" stroke="#8a8480" stroke-width="2" marker-end="url(#diamond)"/>
  <text x="395" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">has-a</text>

  <line x1="460" y1="638" x2="495" y2="638" stroke="#b0aaa2" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-ink)"/>
  <text x="505" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">uses</text>

  <line x1="560" y1="638" x2="595" y2="638" stroke="#b0aaa2" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <text x="605" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">member</text>

  <line x1="690" y1="638" x2="725" y2="638" stroke="#3a7a5a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="735" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">tests</text>

  <line x1="790" y1="638" x2="825" y2="638" stroke="#b07070" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-rose)"/>
  <text x="835" y="642" font-family="sans-serif" font-size="11" fill="#1a1f36">context</text>

  <!-- Footer note -->
  <text x="70" y="673" font-family="sans-serif" font-size="11" font-style="italic" fill="#8a8078">Colored top bars indicate node kind. Edge style encodes the relationship type.</text>
</svg>
