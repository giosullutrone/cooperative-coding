<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f9690;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4361ee;stop-opacity:0.1" />
    </linearGradient>

    <!-- Decorative pattern -->
    <pattern id="dotPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#0f9690" opacity="0.1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)" />

  <!-- Subtle accent overlay -->
  <rect width="1200" height="400" fill="url(#accentGradient)" />

  <!-- Dot pattern background -->
  <rect width="1200" height="400" fill="url(#dotPattern)" />

  <!-- Decorative geometric elements - right side -->
  <g opacity="0.08">
    <!-- Node circles -->
    <circle cx="1000" cy="80" r="8" fill="#0f9690" />
    <circle cx="1050" cy="150" r="6" fill="#4361ee" />
    <circle cx="1080" cy="250" r="7" fill="#ff9f43" />
    <circle cx="950" cy="320" r="5" fill="#0f9690" />

    <!-- Connecting lines (edges) -->
    <line x1="1000" y1="80" x2="1050" y2="150" stroke="#0f9690" stroke-width="1.5" />
    <line x1="1050" y1="150" x2="1080" y2="250" stroke="#4361ee" stroke-width="1.5" />
    <line x1="1080" y1="250" x2="950" y2="320" stroke="#ff9f43" stroke-width="1.5" />
    <line x1="1000" y1="80" x2="1080" y2="250" stroke="#0f9690" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Decorative architectural diagram - left side -->
  <g opacity="0.06">
    <!-- Grid lines -->
    <line x1="50" y1="50" x2="200" y2="50" stroke="#4361ee" stroke-width="1" />
    <line x1="50" y1="100" x2="200" y2="100" stroke="#0f9690" stroke-width="1" />
    <line x1="50" y1="150" x2="200" y2="150" stroke="#4361ee" stroke-width="1" />
    <line x1="50" y1="50" x2="50" y2="200" stroke="#0f9690" stroke-width="1" />
    <line x1="125" y1="50" x2="125" y2="200" stroke="#4361ee" stroke-width="1" />
    <line x1="200" y1="50" x2="200" y2="200" stroke="#0f9690" stroke-width="1" />

    <!-- Small accent squares -->
    <rect x="60" y="60" width="12" height="12" fill="#0f9690" opacity="0.3" />
    <rect x="140" y="110" width="10" height="10" fill="#4361ee" opacity="0.3" />
    <rect x="70" y="160" width="15" height="15" fill="#ff9f43" opacity="0.2" />
  </g>

  <!-- Corner accent bar - top left -->
  <line x1="0" y1="0" x2="120" y2="0" stroke="#0f9690" stroke-width="3" opacity="0.4" />

  <!-- Main content container -->
  <g>
    <!-- Main title -->
    <text x="600" y="140" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-1">
      CooperativeCoding
    </text>

    <!-- Subtitle -->
    <text x="600" y="210" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" text-anchor="middle" fill="#8b949e" letter-spacing="0.5">
      An Open Specification for Human–AI Collaborative Software Design
    </text>

    <!-- Version badge -->
    <g>
      <!-- Badge background -->
      <rect x="540" y="250" width="120" height="40" rx="6" fill="none" stroke="#0f9690" stroke-width="2" opacity="0.6" />

      <!-- Badge text -->
      <text x="600" y="273" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#0f9690" letter-spacing="0.5">
        v1.0.0
      </text>
    </g>
  </g>

  <!-- Accent line - bottom right -->
  <line x1="1080" y1="400" x2="1200" y2="400" stroke="#4361ee" stroke-width="3" opacity="0.3" />
</svg>