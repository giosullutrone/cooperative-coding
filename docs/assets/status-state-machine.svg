<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .state-text { font-size: 18px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; }
      .transition-label { font-size: 12px; font-family: monospace; fill: #e0e0e0; text-anchor: middle; }
      .actor-label { font-size: 11px; fill: #b0b0b0; text-anchor: middle; font-style: italic; }
      .arrow { fill: none; stroke-width: 2; }
      .arrow-head { fill: #8b8b8b; }
    </style>

    <!-- Arrowhead marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head"/>
    </marker>

    <!-- Dashed line pattern for proposed state -->
    <pattern id="dashPattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#4361ee" stroke-width="3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#0d1117"/>

  <!-- States -->

  <!-- PROPOSED (top-center) - electric blue with dashed border -->
  <g id="proposed">
    <rect x="300" y="40" width="200" height="80" rx="12" fill="none" stroke="#4361ee" stroke-width="3" stroke-dasharray="8,4"/>
    <text x="400" y="85" class="state-text" fill="#4361ee">proposed</text>
  </g>

  <!-- ACCEPTED (left) - teal/green with solid border -->
  <g id="accepted">
    <rect x="80" y="240" width="200" height="80" rx="12" fill="none" stroke="#0f9690" stroke-width="3"/>
    <text x="180" y="285" class="state-text" fill="#0f9690">accepted</text>
  </g>

  <!-- REJECTED (right) - red/coral with solid border -->
  <g id="rejected">
    <rect x="520" y="240" width="200" height="80" rx="12" fill="none" stroke="#ef4444" stroke-width="3"/>
    <text x="620" y="285" class="state-text" fill="#ef4444">rejected</text>
  </g>

  <!-- STALE (bottom-center) - amber/yellow with dotted border -->
  <g id="stale">
    <rect x="300" y="380" width="200" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="400" y="425" class="state-text" fill="#f59e0b">stale</text>
  </g>

  <!-- Transitions -->

  <!-- 1. proposed → accepted (Human approval) -->
  <g id="transition-1">
    <path d="M 330 120 Q 240 180 210 240" class="arrow" stroke="#4361ee" marker-end="url(#arrowhead)"/>
    <text x="250" y="165" class="transition-label" fill="#4361ee">approval</text>
    <text x="250" y="180" class="actor-label" fill="#4361ee">(Human)</text>
  </g>

  <!-- 2. proposed → rejected (Human refusal) -->
  <g id="transition-2">
    <path d="M 470 120 Q 560 180 590 240" class="arrow" stroke="#ef4444" marker-end="url(#arrowhead)"/>
    <text x="540" y="165" class="transition-label" fill="#ef4444">refusal</text>
    <text x="540" y="180" class="actor-label" fill="#ef4444">(Human)</text>
  </g>

  <!-- 3. rejected → proposed (Human reconsideration) -->
  <g id="transition-3">
    <path d="M 590 240 Q 560 160 470 120" class="arrow" stroke="#f59e0b" marker-end="url(#arrowhead)"/>
    <text x="550" y="170" class="transition-label" fill="#f59e0b">reconsider</text>
    <text x="550" y="185" class="actor-label" fill="#f59e0b">(Human)</text>
  </g>

  <!-- 4. accepted → stale (Sync engine detects code deletion) -->
  <g id="transition-4">
    <path d="M 210 320 Q 240 360 330 380" class="arrow" stroke="#0f9690" marker-end="url(#arrowhead)"/>
    <text x="245" y="365" class="transition-label" fill="#0f9690">code deleted</text>
    <text x="245" y="380" class="actor-label" fill="#0f9690">(Sync Engine)</text>
  </g>

  <!-- 5. stale → accepted (Code restoration or manual re-link) -->
  <g id="transition-5">
    <path d="M 330 380 Q 290 340 210 320" class="arrow" stroke="#f59e0b" marker-end="url(#arrowhead)"/>
    <text x="260" y="340" class="transition-label" fill="#f59e0b">restored</text>
    <text x="260" y="355" class="actor-label" fill="#f59e0b">(Human/Manual)</text>
  </g>

  <!-- Legend -->
  <g id="legend" opacity="0.7">
    <text x="20" y="480" font-size="11" fill="#8b8b8b">CooperativeCoding Status State Machine</text>
  </g>

</svg>