<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effects -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dashed border pattern for "ghost" nodes -->
    <pattern id="dashed" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#0f9690" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="url(#bgGradient)"/>

  <!-- Central circle for cycle -->
  <circle cx="450" cy="300" r="140" fill="none" stroke="#1f6f6c" stroke-width="1" opacity="0.3"/>

  <!-- Phase circles (4 positions around center) -->
  <!-- DESIGN Phase - Top Left -->
  <circle cx="280" cy="160" r="70" fill="#0f9690" opacity="0.1" stroke="#0f9690" stroke-width="2"/>
  <circle cx="280" cy="160" r="65" fill="none" stroke="#0f9690" stroke-width="1.5" opacity="0.5"/>

  <!-- REVIEW Phase - Top Right -->
  <circle cx="620" cy="160" r="70" fill="#4361ee" opacity="0.1" stroke="#4361ee" stroke-width="2"/>
  <circle cx="620" cy="160" r="65" fill="none" stroke="#4361ee" stroke-width="1.5" opacity="0.5"/>

  <!-- IMPLEMENT Phase - Bottom Right -->
  <circle cx="620" cy="440" r="70" fill="#0f9690" opacity="0.1" stroke="#0f9690" stroke-width="2"/>
  <circle cx="620" cy="440" r="65" fill="none" stroke="#0f9690" stroke-width="1.5" opacity="0.5"/>

  <!-- SYNC Phase - Bottom Left -->
  <circle cx="280" cy="440" r="70" fill="#4361ee" opacity="0.1" stroke="#4361ee" stroke-width="2"/>
  <circle cx="280" cy="440" r="65" fill="none" stroke="#4361ee" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow connectors with gradient -->
  <!-- Design to Review -->
  <defs>
    <marker id="arrowhead-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0f9690" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4361ee" />
    </marker>
  </defs>

  <!-- Curved arrows -->
  <!-- Design → Review -->
  <path d="M 340 190 Q 450 100 560 190" fill="none" stroke="#0f9690" stroke-width="2.5" marker-end="url(#arrowhead-teal)" opacity="0.8"/>

  <!-- Review → Implement -->
  <path d="M 600 230 Q 700 300 600 370" fill="none" stroke="#4361ee" stroke-width="2.5" marker-end="url(#arrowhead-blue)" opacity="0.8"/>

  <!-- Implement → Sync -->
  <path d="M 560 410 Q 450 500 340 410" fill="none" stroke="#0f9690" stroke-width="2.5" marker-end="url(#arrowhead-teal)" opacity="0.8"/>

  <!-- Sync → Design -->
  <path d="M 300 370 Q 200 300 300 230" fill="none" stroke="#4361ee" stroke-width="2.5" marker-end="url(#arrowhead-blue)" opacity="0.8"/>

  <!-- Phase Icons and Labels -->

  <!-- DESIGN Phase -->
  <g id="design-icon">
    <!-- Pencil icon -->
    <line x1="270" y1="145" x2="290" y2="165" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="270,145 275,140 295,160" fill="#0f9690" opacity="0.7"/>
  </g>
  <text x="280" y="185" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">DESIGN</text>
  <text x="280" y="207" font-size="12" fill="#0f9690" text-anchor="middle">Human + Agent</text>

  <!-- REVIEW Phase -->
  <g id="review-icon">
    <!-- Eye/checkmark icon -->
    <circle cx="620" cy="150" r="8" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M 620 148 L 625 153 L 630 148" fill="none" stroke="#4361ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="620" y="185" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">REVIEW</text>
  <text x="620" y="207" font-size="12" fill="#4361ee" text-anchor="middle">Human Authority</text>

  <!-- IMPLEMENT Phase -->
  <g id="implement-icon">
    <!-- Code brackets icon -->
    <text x="615" y="450" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">&lt;</text>
    <text x="625" y="450" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">/</text>
    <text x="635" y="450" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">&gt;</text>
  </g>
  <text x="620" y="475" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">IMPLEMENT</text>
  <text x="620" y="497" font-size="12" fill="#0f9690" text-anchor="middle">Agent Generates</text>

  <!-- SYNC Phase -->
  <g id="sync-icon">
    <!-- Bidirectional sync arrows -->
    <path d="M 270 430 L 270 450" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead-blue)"/>
    <path d="M 290 450 L 290 430" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arrowhead-blue)"/>
  </g>
  <text x="280" y="475" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">SYNC</text>
  <text x="280" y="497" font-size="12" fill="#4361ee" text-anchor="middle">Bidirectional</text>

  <!-- Center text -->
  <text x="450" y="295" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">Cooperation</text>
  <text x="450" y="312" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">Loop</text>

  <!-- Note at bottom -->
  <rect x="50" y="530" width="800" height="50" fill="#0f9690" opacity="0.1" stroke="#0f9690" stroke-width="1" rx="4"/>
  <text x="450" y="550" font-size="11" fill="#ffffff" text-anchor="middle" font-style="italic">
    Either party can act at any time; sync engine serializes changes
  </text>

  <!-- Title -->
  <text x="450" y="35" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">CooperativeCoding</text>
  <text x="450" y="58" font-size="13" fill="#0f9690" text-anchor="middle">Human-AI Collaborative Software Design</text>
</svg>